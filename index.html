<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#222831">

    <!-- ✅ SEO Title and Description (optimized for "community resources houston" search) -->
    <title>Community Resources Guide Houston | Free Assistance Directory</title>
    <meta
      name="description"
      content="Free directory of 1,000+ community resources from 526 organizations across the Greater Houston Area. Search by zip code for food, rent, utilities, housing, medical, legal, and job assistance."
    >
    <meta name="keywords" content="Houston community resources, Houston assistance, free help Houston, food pantry Houston, rent assistance Houston, utility help Houston, Houston social services, Greater Houston Area resources">

    <!-- Canonical URL and og:url are set per-route by react-helmet-async at
         render time (see HomePage, MainApp slug route, etc.). Intentionally
         omitted from this static HTML — a hardcoded canonical pointing at "/"
         was causing Googlebot to treat every route as a duplicate of the
         homepage when its renderer failed/deferred and fell back to the raw
         HTML. With no static canonical, Google treats each URL as its own
         canonical; Helmet still adds the correct one when JS runs. -->

    <!-- ✅ Open Graph Tags (Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Community Resources Guide Houston | Free Assistance Directory">
    <meta property="og:description" content="Free directory of 1,000+ community resources from 526 organizations across the Greater Houston Area. Search by zip code for food, rent, utilities, housing, medical, legal, and job assistance.">
    <meta property="og:image" content="https://crghouston.org/images/CRG%20Logo%202025.webp">
    <meta property="og:site_name" content="Community Resources Guide Houston">
    <meta property="og:locale" content="en_US">

    <!-- ✅ Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Community Resources Guide Houston | Free Assistance Directory">
    <meta name="twitter:description" content="Free directory of 1,000+ community resources from 526 organizations across the Greater Houston Area. Search by zip code for food, rent, utilities, housing, medical, and legal assistance.">
    <meta name="twitter:image" content="https://crghouston.org/images/CRG%20Logo%202025.webp">

    <!-- ✅ Additional SEO Tags -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="Community Resources Guide Houston">
    <meta name="geo.region" content="US-TX">
    <meta name="geo.placename" content="Houston">

    <!-- ✅ Apple/Manifest -->
    <link rel="apple-touch-icon" href="/logo192.png">
    <link rel="manifest" href="/manifest.json">

    <!-- ✅ JSON-LD Structured Data for Google Rich Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Community Resources Guide Houston",
      "alternateName": "CRG Houston",
      "url": "https://crghouston.org/",
      "description": "Free online directory of 1,000+ community resources from 526 organizations across the Greater Houston Area",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://crghouston.org/find?zip={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Community Resources Guide Houston",
      "alternateName": "CRG Houston",
      "url": "https://crghouston.org/",
      "logo": "https://crghouston.org/images/CRG%20Logo%202025.webp",
      "description": "Nonprofit community resource directory serving the Greater Houston Area since 2008",
      "areaServed": {
        "@type": "City",
        "name": "Houston",
        "containedInPlace": {
          "@type": "State",
          "name": "Texas"
        }
      },
      "serviceType": ["Community Resources Directory", "Social Services Referral", "Nonprofit Assistance Guide"],
      "knowsAbout": [
        "Food assistance",
        "Rent assistance",
        "Utility assistance",
        "Housing assistance",
        "Medical assistance",
        "Legal assistance",
        "Job assistance",
        "Homeless services",
        "Domestic abuse services"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Houston Community Resources Directory",
      "description": "Searchable database of 1,000+ community resources from 526 organizations in Harris County and the Greater Houston Area",
      "url": "https://crghouston.org/",
      "license": "https://crghouston.org/privacy",
      "creator": {
        "@type": "Organization",
        "name": "Community Resources Guide Houston"
      },
      "spatialCoverage": {
        "@type": "Place",
        "name": "Greater Houston Area, Texas"
      },
      "temporalCoverage": "2008/..",
      "variableMeasured": ["Organization name", "Services offered", "Contact information", "Service area by zip code", "Hours of operation", "Eligibility requirements"]
    }
    </script>

    <!-- ✅ Preload Background Image -->
    <link
      rel="preload"
      as="image"
      href="/images/CRG%20Logo%20462.png"
    >

    <!-- Warm the TLS/HTTP connection to Supabase before the first data request fires.
         This helps Chrome iOS specifically, where Chrome's private network stack (Cronet)
         otherwise performs a cold DNS+TLS+HTTP handshake on the first Supabase query,
         causing a multi-second stall on the first zip click. Safari iOS is unaffected
         because it reuses system-level connection state. -->
    <link rel="preconnect" href="https://oxlhrpjmudyklffbbdva.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://oxlhrpjmudyklffbbdva.supabase.co">

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap"
      rel="stylesheet"
    >
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VVDHXSJ5K3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VVDHXSJ5K3');
</script>

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
